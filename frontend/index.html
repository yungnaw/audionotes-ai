<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AudioNotes AI - 智能音频学习助手。本地转录 + AI笔记生成，支持B站视频导入。">
  <title>AudioNotes AI - 智能音频学习助手</title>
  <link rel="stylesheet" href="/css/styles.css?v=3">
</head>
<body>

<div id="app">
  <!-- ===== Header ===== -->
  <header class="header" style="height: 64px;">
    <div class="header-brand" id="nav-home">
      <div class="header-logo">A</div>
      <div>
        <div class="header-title">AudioNotes</div>
        <div class="header-subtitle">智能音频学习助手</div>
      </div>
    </div>
    <div class="header-actions">
      <!-- Task Selection in Header -->
      <div style="display: flex; gap: 8px; align-items: center; background: rgba(255,255,255,0.03); padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); margin-right: 8px;">
        <select class="input" id="active-task-select" style="width: auto; height: 32px; padding: 2px 8px; font-size: 13px; background: transparent; border: none; color: var(--text-primary); font-weight: bold; cursor: pointer;">
          <option value="default" style="background: #1e1e2e;">默认任务</option>
        </select>
        <button class="btn-icon" id="create-task-btn" title="新建任务" style="width: 28px; height: 28px; padding: 0; background: var(--bg-tertiary); border-radius: 6px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-primary);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <button class="btn btn-secondary" id="nav-workspace" style="height: 32px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        工作台
      </button>
    </div>
  </header>

  <!-- ===== Main Content ===== -->
  <div class="main-content">

    <!-- ===== HOME VIEW ===== -->
    <div id="view-home" class="view home-view active">
      <div class="home-container">
        <div class="home-hero-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10v3"/><path d="M6 6v11"/><path d="M10 3v18"/><path d="M14 8v7"/><path d="M18 5v13"/><path d="M22 10v3"/></svg>
        </div>
        <div class="home-hero">
          <h2>智能音频学习助手</h2>
          <p>上传讲座、会议录音或导入 B站视频，<br>本地极速转录 + AI 自动生成结构化学习笔记</p>
        </div>

        <!-- Upload Zone -->
        <div class="upload-zone" id="upload-zone" style="width: 100%;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>拖拽音频文件到此处，或点击上传</p>
          <p class="hint">支持 MP3 / WAV / M4A / FLAC / OGG</p>
        </div>

        <!-- Bilibili Import -->
        <div class="bili-section">
          <h3>🔗 Bilibili 视频导入</h3>
          <div class="bili-input-row">
            <input type="text" class="input" id="bili-url-input" placeholder="输入B站视频链接或 BV 号...">
            <button class="btn btn-primary" id="bili-import-btn">导入</button>
          </div>
        </div>

        <!-- Model Settings -->
        <div class="settings-section" style="margin-top: 32px; width: 100%;">
          <h3>⚙️ 模型与参数设置</h3>
          
          <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px;">
            <div>
              <label style="display:block; margin-bottom:6px; font-size:13px; color:var(--text-muted); font-weight: 600;">AI 服务商</label>
              <select class="input" id="provider-select" style="width: 100%;">
                <option value="gemini">Gemini (谷歌)</option>
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic (Claude)</option>
                <option value="deepseek">DeepSeek (深度求索)</option>
                <option value="qwen">Qwen (通义千问)</option>
                <option value="glm">GLM (智谱清言)</option>
              </select>
            </div>
            <div>
              <label id="api-key-label" style="display:block; margin-bottom:6px; font-size:13px; color:var(--text-muted); font-weight: 600;">Gemini API Key (默认使用服务端配置)</label>
              <input type="password" class="input" id="api-key-input" style="width: 100%;" placeholder="输入你自己的 Gemini API Key (可选)">
            </div>
            <div>
              <label style="display:block; margin-bottom:6px; font-size:13px; color:var(--text-muted); font-weight: 600;">模型选择</label>
              <select class="input" id="model-select" style="width: 100%;">
                <!-- Will be dynamically populated or fall back -->
              </select>
            </div>
          </div>

          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <label style="font-size:14px; color:var(--text-muted)">📝 提示词模板选单 (支持 <code>{text}</code> 占位符)</label>
            <select class="input" id="template-select" style="width: auto; padding: 4px 8px; font-size: 13px; height: 32px;">
              <option value="default">默认核心学习笔记 (通用结构)</option>
              <option value="academic">学术论文与科研重难点梳理</option>
              <option value="business">商业模式与落地可行性分析</option>
              <option value="meeting">会议/访谈摘要与行动任务清单</option>
              <option value="concept">核心概念与关键术语深度拆解</option>
            </select>
          </div>
          <div class="prompt-templates" style="margin-bottom: 8px; display: none;">
            <button class="template-btn active" id="tmpl-default">默认模板</button>
            <button class="template-btn" id="tmpl-academic">学术风格</button>
            <button class="template-btn" id="tmpl-business">商业分析</button>
          </div>
          <textarea class="input" id="custom-prompt" style="height: 200px; font-family: monospace; line-height: 1.5;"></textarea>
        </div>
        <!-- Local Transcription Settings -->
        <div class="settings-section" style="margin-top: 24px;">
          <h3>🎙️ 本地转录引擎设置 (SenseVoice)</h3>
          <div style="display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-end; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 200px;">
              <label style="display:block; margin-bottom:8px; font-size:14px; color:var(--text-muted)">运行设备 (Device)</label>
              <div style="display: flex; gap: 8px;">
                <button class="template-btn active" id="device-cpu" style="flex: 1; padding: 10px; text-align: center; border-radius: 6px;">CPU 模式</button>
                <button class="template-btn" id="device-cuda" style="flex: 1; padding: 10px; text-align: center; border-radius: 6px;">GPU (CUDA) 模式</button>
              </div>
              <p id="cuda-warning" style="display:none; font-size:11px; color:#f43f5e; margin-top: 8px; font-style: italic; line-height: 1.4;">
                ⚠️ 系统未检测到可用的 NVIDIA CUDA 环境（请参照提示安装）
              </p>
            </div>
            <div style="flex: 1; min-width: 200px;">
              <div style="display: flex; justify-content: space-between; margin-bottom:8px;">
                <label style="font-size:14px; color:var(--text-muted)">最大并行个数 (Threads)</label>
                <span id="threads-val" style="font-size:14px; font-weight:bold; color:var(--text-main)">8</span>
              </div>
              <input type="range" id="threads-input" min="1" max="16" step="1" value="8" style="width: 100%; accent-color: var(--primary);">
            </div>
          </div>
        </div>

        <!-- Recent Files -->
        <div class="recent-section">
          <h3>📄 最近处理</h3>
          <div class="recent-list" id="recent-list"></div>
        </div>
      </div>
    </div>

    <!-- ===== WORKSPACE VIEW ===== -->
    <div id="view-workspace" class="view workspace-view">
      <div class="workspace-toolbar">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="workspace-search" placeholder="搜索文件名...">
        </div>
        <div style="display: flex; gap: 8px; align-items: center; background: rgba(255,255,255,0.02); padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);">
          <span style="font-size:13px; color:var(--text-muted); white-space:nowrap;">任务场景:</span>
          <select class="input" id="workspace-task-filter" style="width: auto; height: 28px; padding: 2px 8px; font-size: 13px; background: transparent; border: none; color: var(--text-main); font-weight: bold; cursor: pointer;">
            <option value="all" style="background: #1e1e2e;">全部场景</option>
            <option value="default" style="background: #1e1e2e;">默认任务</option>
          </select>
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">全部</button>
          <button class="filter-tab" data-filter="idle">待处理</button>
          <button class="filter-tab" data-filter="processing">处理中</button>
          <button class="filter-tab" data-filter="completed">已完成</button>
          <button class="filter-tab" data-filter="failed">失败</button>
        </div>
        <div style="flex:1"></div>
        <button class="btn btn-secondary" id="select-all-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
          全选
        </button>
        <button class="btn btn-primary" id="batch-process-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="6 3 20 12 6 21 6 3"/></svg>
          开始处理
        </button>
        <button class="btn btn-secondary" id="global-pause-btn" style="background: #e11d48; border-color: #e11d48; color: white;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
          <span id="pause-btn-text">暂停处理</span>
        </button>
        <button class="btn btn-secondary" id="batch-export-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          批量导出
        </button>
        <button class="btn btn-danger" id="clear-all-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          清空
        </button>
      </div>
      <div class="workspace-list" id="workspace-list"></div>

      <!-- Workspace Pagination -->
      <div class="pagination-container" style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding: 12px 16px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; gap: 12px;">
        <div style="display: flex; align-items: center; gap: 12px;">
          <span style="font-size:13px; color:var(--text-muted);">每页显示:</span>
          <select class="input" id="page-size-select" style="width: auto; height: 32px; padding: 2px 8px; font-size: 13px; background: var(--bg-card); border-color: rgba(255,255,255,0.1);">
            <option value="10">10 条</option>
            <option value="20">20 条</option>
            <option value="50">50 条</option>
            <option value="100">100 条</option>
          </select>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
          <button class="btn btn-secondary" id="page-prev-btn" style="padding: 6px 12px; font-size: 13px; height: 32px;">上一页</button>
          <span id="page-info" style="font-size:13px; color:var(--text-main); font-weight: bold; margin: 0 8px;">第 1 / 1 页</span>
          <button class="btn btn-secondary" id="page-next-btn" style="padding: 6px 12px; font-size: 13px; height: 32px;">下一页</button>
        </div>
      </div>
    </div>

    <!-- ===== DETAIL VIEW ===== -->
    <div id="view-detail" class="view detail-view">
      <div class="detail-header">
        <button class="btn btn-ghost" id="detail-back-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          返回列表
        </button>
        <span class="file-title" id="detail-file-title"></span>
        <button class="btn btn-secondary hidden" id="detail-export-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出笔记
        </button>
      </div>
      <div class="detail-body">
        <div class="detail-pane" style="flex:3">
          <div class="pane-header">
            <span class="label">📝 AI 学习笔记</span>
          </div>
          <div class="pane-body" id="notes-content">
            <div class="status-message">
              <h3>等待处理</h3>
            </div>
          </div>
        </div>
        <div class="detail-pane" style="flex:2">
          <div class="pane-header">
            <span class="label">📃 原始转录文本</span>
          </div>
          <div class="pane-body">
            <div class="transcription-text" id="trans-content">暂无转录文本</div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /main-content -->
</div><!-- /app -->

<!-- Hidden file input -->
<input type="file" id="file-input" class="hidden" multiple accept=".mp3,.wav,.m4a,.mp4,.ogg,.aac,.flac">

<!-- Modal overlay -->
<div id="modal-overlay" class="modal-overlay hidden"></div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<script src="/js/api.js?v=8"></script>
<script src="/js/app.js?v=8"></script>
</body>
</html>
